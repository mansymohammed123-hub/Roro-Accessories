<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roro Accessories</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #2d1a1a;
      --white: #ffffff;
      --cream: #fff5f7;
      --accent: #e75480;
      --accent-dark: #c73060;
      --accent-light: #ffd6e0;
      --gray: #999;
      --light-gray: #f0e0e5;
      --card-bg: #fff;
      --nav-bg: #fff0f3;
    }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--black); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg); display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 68px;
      box-shadow: 0 2px 16px rgba(231,84,128,0.12);
      border-bottom: 2px solid var(--accent-light);
    }
    .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.7rem; letter-spacing: 3px; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: #b06080; text-decoration: none; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .cart-btn { display: flex; align-items: center; gap: 0.5rem; background: var(--accent); color: var(--white); border: none; padding: 0.55rem 1.3rem; border-radius: 25px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
    .cart-btn:hover { background: var(--accent-dark); }
    .cart-count { background: var(--white); color: var(--accent); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    .hero { background: linear-gradient(135deg, #ffd6e0 0%, #ffb3c6 50%, #ff85a1 100%); text-align: center; padding: 5rem 2rem 4rem; position: relative; overflow: hidden; }
    .hero::before { content: '🎀'; position: absolute; top: 20px; left: 5%; font-size: 3rem; opacity: 0.3; }
    .hero::after { content: '✨'; position: absolute; bottom: 20px; right: 5%; font-size: 3rem; opacity: 0.3; }
    .hero-eyebrow { font-size: 0.75rem; letter-spacing: 5px; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 1rem; font-weight: 600; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; line-height: 1.1; margin-bottom: 1rem; color: #2d1a1a; }
    .hero p { color: #7a3050; font-size: 1rem; max-width: 480px; margin: 0 auto 2rem; line-height: 1.7; }
    .hero-cta { display: inline-block; background: var(--accent); color: var(--white); padding: 0.9rem 2.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; border: none; border-radius: 30px; }
    .hero-cta:hover { background: var(--accent-dark); transform: translateY(-2px); }
    .filters { display: flex; gap: 0.75rem; padding: 2rem 2.5rem 0; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-right: 0.5rem; }
    .filter-btn { padding: 0.4rem 1.2rem; border: 1.5px solid var(--accent-light); background: var(--white); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 20px; transition: all 0.2s; color: #b06080; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; padding: 2rem 2.5rem 0; color: var(--black); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; padding: 1.5rem 2.5rem 3rem; }
    .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(231,84,128,0.1); transition: transform 0.25s, box-shadow 0.25s; border: 1px solid var(--accent-light); }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(231,84,128,0.2); }
    .card-img { width: 100%; height: 300px; object-fit: cover; display: block; }
    .card-body { padding: 1.1rem 1.2rem 1.3rem; }
    .card-category { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; font-weight: 600; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; }
    .card-price { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 0.9rem; }
    .sizes-row { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .size-chip { padding: 0.2rem 0.6rem; border: 1.5px solid var(--accent-light); font-size: 0.7rem; border-radius: 10px; cursor: pointer; transition: all 0.15s; color: #b06080; background: #fff; }
    .size-chip:hover, .size-chip.selected { background: var(--accent); color: var(--white); border-color: var(--accent); }
    .add-btn { width: 100%; padding: 0.65rem; background: var(--accent-light); color: var(--accent-dark); border: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: all 0.2s; border-radius: 10px; font-family: 'Inter', sans-serif; }
    .add-btn:hover { background: var(--accent); color: var(--white); }
    .add-btn:disabled { background: var(--light-gray); color: var(--gray); cursor: not-allowed; }
    #toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; background: var(--accent); color: var(--white); padding: 0.85rem 1.5rem; border-radius: 25px; font-size: 0.875rem; transform: translateY(120%); transition: transform 0.3s ease; }
    #toast.show { transform: translateY(0); }
    .overlay { position: fixed; inset: 0; background: rgba(45,26,26,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .cart-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; max-width: 100vw; background: var(--white); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .cart-sidebar.open { transform: translateX(0); }
    .cart-header { padding: 1.5rem; border-bottom: 2px solid var(--accent-light); display: flex; justify-content: space-between; align-items: center; background: var(--nav-bg); }
    .cart-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--accent); }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .cart-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--accent-light); align-items: center; }
    .cart-item img { width: 70px; height: 85px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .cart-item-meta { font-size: 0.78rem; color: var(--gray); margin-bottom: 0.4rem; }
    .cart-item-price { font-weight: 700; font-size: 0.9rem; color: var(--accent); }
    .remove-item { background: none; border: none; color: var(--accent-light); cursor: pointer; font-size: 1.1rem; transition: color 0.15s; }
    .remove-item:hover { color: var(--accent-dark); }
    .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--gray); }
    .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .cart-footer { padding: 1.5rem; border-top: 2px solid var(--accent-light); }
    .cart-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.2rem; }
    .cart-total span:last-child { color: var(--accent); }
    .checkout-btn { width: 100%; padding: 1rem; background: var(--accent); color: var(--white); border: none; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 25px; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .checkout-btn:hover { background: var(--accent-dark); }
    .no-results { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--gray); }
    footer { text-align: center; padding: 2rem; background: var(--nav-bg); color: #3a061b; font-size: 0.85rem; border-top: 2px solid var(--accent-light); }
    footer strong { color: var(--accent); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(45,26,26,0.5); z-index: 300; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; padding: 2rem; width: 90%; max-width: 480px; }
    .modal h3 { font-family: 'Playfair Display', serif; color: var(--accent); margin-bottom: 1.5rem; font-size: 1.4rem; }
    .modal input { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--accent-light); border-radius: 10px; font-size: 0.95rem; margin-bottom: 1rem; font-family: 'Inter', sans-serif; outline: none; }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 1rem; }
    .modal-cancel { flex: 1; padding: 0.8rem; background: var(--light-gray); color: var(--gray); border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; }
    .modal-submit { flex: 2; padding: 0.8rem; background: var(--accent); color: var(--white); border: none; border-radius: 10px; cursor: pointer; font-weight: 700; letter-spacing: 1px; font-family: 'Inter', sans-serif; }
    .modal-submit:hover { background: var(--accent-dark); }
  </style>
</head>
<body>

<nav>
  <div><span class="nav-brand">Roro Accessories</span></div>
  <div class="nav-links">
    <a onclick="filterProducts('all')" class="active" id="nav-all">All</a>
    <a onclick="filterProducts('Accessories')" id="nav-Accessories">Accessories</a>
  </div>
  <button class="cart-btn" onclick="openCart()">🛍 Cart <span class="cart-count" id="cart-count">0</span></button>
</nav>

<div class="hero">
  <p class="hero-eyebrow">✨ New Collection 2026 ✨</p>
  <h1>Accessories That<br/>Tell Your Story</h1>
  <p>Handpicked pieces designed to make you shine every day.</p>
  <button class="hero-cta" onclick="document.querySelector('.products-grid').scrollIntoView({behavior:'smooth'})">Shop Now 🎀</button>
</div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="filterProducts('all')" data-cat="all">All</button>
  <button class="filter-btn" onclick="filterProducts('Accessories')" data-cat="Accessories">Accessories</button>
</div>

<h2 class="section-title">Our Collection 🎀</h2>
<div class="products-grid" id="products-grid"></div>
<div id="toast"></div>
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h2>🛍 Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total"><span>Total</span><span id="cart-total">$0.00</span></div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout 🎀</button>
  </div>
</div>

<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <h3>🎀 Complete Your Order</h3>
    <input type="text" id="cust-name" placeholder="Your full name" />
    <input type="tel" id="cust-phone" placeholder="Your phone number" />
    <input type="text" id="cust-address" placeholder="Your delivery address" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeCheckout()">Cancel</button>
      <button class="modal-submit" onclick="submitOrder()">Place Order ✓</button>
    </div>
  </div>
</div>

<footer>Made with 💕 by <strong>MOODY</strong> — Your style, your story.</footer>

<script>
const PRODUCTS = [
  {"id":1,"name":"Classic White Tee","price":175,"category":"Accessories","image":"images/img1.jpeg","sizes":["S","M","L","XL"]},
  {"id":2,"name":"Slim Fit Jeans","price":175,"category":"Accessories","image":"images/img2.jpeg","sizes":["28","30","32","34","36"]},
  {"id":3,"name":"Floral Summer Dress","price":175,"category":"Accessories","image":"images/img3.jpeg","sizes":["XS","S","M","L"]},
  {"id":4,"name":"Leather Biker Jacket","price":205,"category":"Accessories","image":"images/img4.jpeg","sizes":["S","M","L","XL"]},
  {"id":5,"name":"Striped Polo Shirt","price":175,"category":"Accessories","image":"images/img5.jpeg","sizes":["S","M","L","XL","XXL"]},
  {"id":6,"name":"High-Waist Trousers","price":245,"category":"Accessories","image":"images/img6.jpeg","sizes":["XS","S","M","L"]},
  {"id":7,"name":"Oversized Hoodie","price":175,"category":"Accessories","image":"images/img7.jpeg","sizes":["S","M","L","XL","XXL"]},
  {"id":8,"name":"Maxi Wrap Skirt","price":175,"category":"Accessories","image":"images/img8.jpeg","sizes":["XS","S","M","L"]},
  {"id":9,"name":"Maxi Wrap Skirt 2","price":175,"category":"Accessories","image":"images/img9.jpeg","sizes":["XS","S","M","L"]},
  {"id":10,"name":"Maxi Wrap Skirt 3","price":215,"category":"Accessories","image":"images/img10.jpeg","sizes":["XS","S","M","L"]}
];

let cart = JSON.parse(localStorage.getItem('roro_cart') || '[]');
let selectedSizes = {};

function saveCart() { localStorage.setItem('roro_cart', JSON.stringify(cart)); }
function getCount() { return cart.reduce((s, i) => s + i.quantity, 0); }
function updateCount() { document.getElementById('cart-count').textContent = getCount(); }

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  if (!products.length) { grid.innerHTML = '<div class="no-results">No products found.</div>'; return; }
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=Image'"/>
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price} EGP</div>
        <div class="sizes-row">${p.sizes.map(s => `<span class="size-chip" onclick="selectSize(${p.id},'${s}',this)">${s}</span>`).join('')}</div>
        <button class="add-btn" id="add-btn-${p.id}" onclick="addToCart(${p.id})" disabled>Select a Size</button>
      </div>
    </div>`).join('');
}

function filterProducts(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + cat);
  if (el) el.classList.add('active');
  renderProducts(cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat));
}

function selectSize(id, size, el) {
  selectedSizes[id] = size;
  el.closest('.sizes-row').querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const btn = document.getElementById('add-btn-' + id);
  btn.disabled = false;
  btn.textContent = `Add to Cart — ${size}`;
}

function addToCart(id) {
  const size = selectedSizes[id];
  if (!size) { showToast('Please select a size'); return; }
  const existing = cart.find(i => i.product_id === id && i.size === size);
  if (existing) existing.quantity++;
  else cart.push({ product_id: id, size, quantity: 1 });
  saveCart(); updateCount();
  const p = PRODUCTS.find(p => p.id === id);
  showToast(`✓ ${p.name} (${size}) added to cart`);
}

function loadCart() {
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  updateCount();
  if (!cart.length) {
    list.innerHTML = `<div class="cart-empty"><div class="empty-icon">🛍</div><p>Your cart is empty</p></div>`;
    footer.style.display = 'none'; return;
  }
  let total = 0;
  footer.style.display = 'block';
  list.innerHTML = cart.map(item => {
    const p = PRODUCTS.find(p => p.id === item.product_id);
    if (!p) return '';
    const sub = p.price * item.quantity;
    total += sub;
    return `<div class="cart-item">
      <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/70x85'"/>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-meta">Size: ${item.size} · Qty: ${item.quantity}</div>
        <div class="cart-item-price">${sub} EGP</div>
      </div>
      <button class="remove-item" onclick="removeItem(${item.product_id},'${item.size}')">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = total + ' EGP';
}

function removeItem(id, size) {
  cart = cart.filter(i => !(i.product_id === id && i.size === size));
  saveCart(); loadCart();
}

function openCart() {
  document.getElementById('cart-sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  loadCart();
}

function closeCart() {
  document.getElementById('cart-sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function openCheckout() {
  closeCart();
  document.getElementById('checkout-modal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
}

function submitOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const address = document.getElementById('cust-address').value.trim();
  if (!name || !phone || !address) { showToast('Please fill all fields'); return; }
  let total = 0;
  const items = cart.map(item => {
    const p =PRODUCTS.find(p => p.id === item.product_id);
    total += p.price * item.quantity;
    return `${p.name} (${item.size}) x${item.quantity} = ${p.price * item.quantity} EGP`;
  }).join('\n');
  const msg = `🎀 New Order from Roro Accessories!\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}\n\nItems:\n${items}\n\nTotal: ${total} EGP`;
  const waLink = `https://wa.me/201501566819?text=${encodeURIComponent(msg)}`;
  window.open(waLink, '_blank');
  cart = []; saveCart(); updateCount();
  closeCheckout();
  showToast('🎉 Order sent! Thank you ' + name + '!');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

updateCount();
renderProducts(PRODUCTS);
</script>
</body>
</html>
